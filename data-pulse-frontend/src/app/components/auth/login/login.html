<div>
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
        <div class="card shadow-lg border-0" style="max-width: 450px; width: 100%;">
            <div class="card-body p-5">

                <header class="text-center mb-5">
                    <h2 class="fw-bold text-primary display-4">Data Pulse</h2>
                    <p class="text-muted fs-4">Gestión de datos de alto rendimiento</p>
                </header>

                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                    <div class="form-floating mb-4">
                        <input type="text" formControlName="username" class="form-control" id="user"
                            placeholder="Usuario">
                        <label for="user">Nombre de Usuario</label>
                    </div>

                    <div class="form-floating mb-5">
                        <input type="password" formControlName="password" class="form-control" id="pass"
                            placeholder="Contraseña">
                        <label for="pass">Contraseña</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fs-4 fw-bold shadow"
                        [disabled]="loginForm.invalid">
                        Entrar al Sistema
                    </button>

                    <div class="text-center mt-5">
                        <p class="fs-5 text-secondary">
                            ¿No tienes cuenta todavía?
                            <a routerLink="/register" class="text-primary fw-bold text-decoration-none">Regístrate
                                aquí</a>
                        </p>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
