<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="card shadow-lg border-0" style="max-width: 450px; width: 100%;">
        <div class="card-body p-5">
            <h2 class="text-center fw-bold text-primary mb-4">Crear Cuenta</h2>

            @if (errorMessage) {
            <div class="alert alert-danger small">{{ errorMessage }}</div>
            }
            @if (successMessage) {
            <div class="alert alert-success small">{{ successMessage }}</div>
            }

            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Nombre Completo</label>
                    <input type="text" formControlName="nombre_completo" class="form-control"
                        [class.is-invalid]="registerForm.get('nombre_completo')?.touched && registerForm.get('nombre_completo')?.invalid">
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">Correo Electrónico</label>
                    <input type="email" formControlName="email" class="form-control"
                        [class.is-invalid]="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">Contraseña</label>
                    <input type="password" formControlName="password" class="form-control"
                        [class.is-invalid]="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">Confirmar Contraseña</label>
                    <input type="password" formControlName="confirm_password" class="form-control"
                        [class.is-invalid]="registerForm.hasError('notSame') && registerForm.get('confirm_password')?.touched">
                    @if (registerForm.hasError('notSame')) {
                    <div class="text-danger small mt-1">Las contraseñas no coinciden.</div>
                    }
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm" [disabled]="registerForm.invalid">
                    Registrarse
                </button>
            </form>

            <div class="text-center mt-4">
                <small class="text-muted">¿Ya tienes cuenta? <a routerLink="/login"
                        class="text-decoration-none fw-bold">Inicia sesión</a></small>
            </div>
        </div>
    </div>
</div>
